<svg xmlns="http://www.w3.org/2000/svg" width="680" height="400" viewBox="0 0 680 400" font-family="'Noto Sans CJK TC','Microsoft JhengHei',sans-serif">
<rect width="680" height="400" fill="#ffffff"/>
<text x="230" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">四層評估框架</text>
<text x="525" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">台灣現有覆蓋</text>
<rect x="60" y="80" width="340" height="56" rx="8" fill="#eef0f3" stroke="#8a94a6" stroke-width="1"/><text x="230.0" y="102" text-anchor="middle" font-size="15" font-weight="600" fill="#3a4354">內容層</text><text x="230.0" y="121" text-anchor="middle" font-size="11.5" fill="#444">說得對不對、穩不穩</text>
<rect x="430" y="80" width="190" height="56" rx="8" fill="#e0f2f0" stroke="#2f9e8f" stroke-width="1"/><text x="525.0" y="102" text-anchor="middle" font-size="15" font-weight="600" fill="#134e46">已覆蓋</text><text x="525.0" y="121" text-anchor="middle" font-size="11.5" fill="#444">AIEC、FinLLM 標準</text>
<rect x="60" y="150" width="340" height="56" rx="8" fill="#eef0f3" stroke="#8a94a6" stroke-width="1"/><text x="230.0" y="172" text-anchor="middle" font-size="15" font-weight="600" fill="#3a4354">行為層</text><text x="230.0" y="191" text-anchor="middle" font-size="11.5" fill="#444">做事守不守規矩</text>
<rect x="430" y="150" width="190" height="56" rx="8" fill="#fdeae6" stroke="#d0563b" stroke-width="1"/><text x="525.0" y="172" text-anchor="middle" font-size="15" font-weight="600" fill="#7a2a18">空白</text><text x="525.0" y="191" text-anchor="middle" font-size="11.5" fill="#444">未見公開的獨立第三方</text>
<rect x="60" y="220" width="340" height="56" rx="8" fill="#eef0f3" stroke="#8a94a6" stroke-width="1"/><text x="230.0" y="242" text-anchor="middle" font-size="15" font-weight="600" fill="#3a4354">失效層</text><text x="230.0" y="261" text-anchor="middle" font-size="11.5" fill="#444">錯的時候怎麼錯</text>
<rect x="430" y="220" width="190" height="56" rx="8" fill="#fdeae6" stroke="#d0563b" stroke-width="1"/><text x="525.0" y="242" text-anchor="middle" font-size="15" font-weight="600" fill="#7a2a18">空白</text><text x="525.0" y="261" text-anchor="middle" font-size="11.5" fill="#444">未見公開的獨立第三方</text>
<rect x="60" y="290" width="340" height="56" rx="8" fill="#eef0f3" stroke="#8a94a6" stroke-width="1"/><text x="230.0" y="312" text-anchor="middle" font-size="15" font-weight="600" fill="#3a4354">軌跡層</text><text x="230.0" y="331" text-anchor="middle" font-size="11.5" fill="#444">事後查不查得到帳</text>
<rect x="430" y="290" width="190" height="56" rx="8" fill="#fdf1dc" stroke="#d99a2b" stroke-width="1"/><text x="525.0" y="312" text-anchor="middle" font-size="15" font-weight="600" fill="#7a5410">部分</text><text x="525.0" y="331" text-anchor="middle" font-size="11.5" fill="#444">有工具,無標準</text>
<rect x="100" y="364" width="14" height="14" rx="3" fill="#e0f2f0" stroke="#2f9e8f"/><text x="122" y="375" font-size="11.5" fill="#444">已覆蓋</text>
<rect x="200" y="364" width="14" height="14" rx="3" fill="#fdf1dc" stroke="#d99a2b"/><text x="222" y="375" font-size="11.5" fill="#444">部分覆蓋</text>
<rect x="320" y="364" width="14" height="14" rx="3" fill="#fdeae6" stroke="#d0563b"/><text x="342" y="375" font-size="11.5" fill="#444">空白,本框架的位置</text></svg>
